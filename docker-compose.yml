services:
  apache:
    build: docker/php
    ports:
      - "8080:80"
    volumes:
      - ./src:/var/www/html

  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: Aurora
      MYSQL_USER: appuser
      MYSQL_PASSWORD: apppass
    volumes:
      - ./src/app/db/createscript.sql:/docker-entrypoint-initdb.d/init.sql

  phpmyadmin:
    image: phpmyadmin
    ports:
      - "8081:80"
    environment:
      PMA_HOST: mysql

